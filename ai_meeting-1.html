<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>AI 회의 중재자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2236;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --warn: #f59e0b;
    --success: #10b981;
    --danger: #ef4444;
    --text: #e2e8f0;
    --text2: #94a3b8;
    --border: rgba(59,130,246,0.2);
    --glow: 0 0 30px rgba(59,130,246,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 배경 그리드 효과 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 120px;
  }

  /* 헤더 */
  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 32px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    width: 44px;
    height: 44px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    box-shadow: var(--glow);
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-text p {
    font-size: 13px;
    color: var(--text2);
    margin-top: 2px;
  }

  .status-badge {
    margin-left: auto;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    font-family: 'JetBrains Mono', monospace;
    border: 1px solid;
    transition: all 0.3s;
  }

  .status-badge.idle {
    color: var(--text2);
    border-color: rgba(148,163,184,0.3);
    background: rgba(148,163,184,0.05);
  }

  .status-badge.listening {
    color: var(--success);
    border-color: rgba(16,185,129,0.4);
    background: rgba(16,185,129,0.08);
    animation: pulse-badge 2s infinite;
  }

  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 0 0 0 rgba(16,185,129,0.3); }
    50% { box-shadow: 0 0 0 6px rgba(16,185,129,0); }
  }

  /* API 키 입력 */
  .api-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
  }

  .api-label {
    font-size: 12px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .api-input-row {
    display: flex;
    gap: 10px;
  }

  .api-input {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .api-input:focus {
    border-color: var(--accent);
  }

  .api-input::placeholder {
    color: var(--text2);
    opacity: 0.5;
  }

  .btn-save {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 10px;
    padding: 12px 20px;
    color: white;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s, transform 0.1s;
  }

  .btn-save:active { transform: scale(0.97); }

  .api-saved {
    font-size: 12px;
    color: var(--success);
    margin-top: 8px;
    display: none;
  }

  /* 개입 알림 */
  .intervention {
    background: linear-gradient(135deg, rgba(245,158,11,0.12), rgba(245,158,11,0.06));
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 14px;
    padding: 16px 20px;
    margin-bottom: 20px;
    display: none;
    animation: slideIn 0.4s ease;
  }

  .intervention.show { display: flex; align-items: flex-start; gap: 12px; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .intervention-icon { font-size: 20px; flex-shrink: 0; margin-top: 1px; }

  .intervention-text {
    font-size: 14px;
    color: #fcd34d;
    line-height: 1.6;
  }

  /* 음성 인식 패널 */
  .speech-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    min-height: 200px;
    position: relative;
    transition: border-color 0.3s;
  }

  .speech-panel.active {
    border-color: rgba(59,130,246,0.5);
    box-shadow: var(--glow);
  }

  .panel-label {
    font-size: 11px;
    color: var(--text2);
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .rec-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--danger);
    display: none;
  }

  .rec-dot.show {
    display: block;
    animation: blink 1s infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  .speech-text {
    font-size: 17px;
    line-height: 1.8;
    color: var(--text);
    min-height: 140px;
  }

  .speech-text.placeholder {
    color: var(--text2);
    font-size: 15px;
  }

  /* 파형 시각화 */
  .waveform {
    display: none;
    align-items: center;
    gap: 3px;
    height: 32px;
    margin-top: 16px;
  }

  .waveform.show { display: flex; }

  .wave-bar {
    width: 4px;
    border-radius: 2px;
    background: linear-gradient(to top, var(--accent), var(--accent2));
    animation: wave 0.8s ease-in-out infinite;
  }

  .wave-bar:nth-child(1) { animation-delay: 0s; }
  .wave-bar:nth-child(2) { animation-delay: 0.1s; }
  .wave-bar:nth-child(3) { animation-delay: 0.2s; }
  .wave-bar:nth-child(4) { animation-delay: 0.3s; }
  .wave-bar:nth-child(5) { animation-delay: 0.4s; }
  .wave-bar:nth-child(6) { animation-delay: 0.5s; }
  .wave-bar:nth-child(7) { animation-delay: 0.3s; }
  .wave-bar:nth-child(8) { animation-delay: 0.2s; }
  .wave-bar:nth-child(9) { animation-delay: 0.1s; }

  @keyframes wave {
    0%, 100% { height: 6px; }
    50% { height: 28px; }
  }

  /* 타이머 */
  .timer {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text2);
    margin-top: 12px;
    display: none;
  }

  .timer.show { display: block; }

  /* AI 리포트 */
  .report-panel {
    background: var(--surface);
    border: 1px solid rgba(6,182,212,0.2);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 16px;
    display: none;
  }

  .report-panel.show { display: block; animation: slideIn 0.4s ease; }

  .report-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    padding-bottom: 14px;
    border-bottom: 1px solid rgba(6,182,212,0.15);
  }

  .report-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, rgba(6,182,212,0.2), rgba(59,130,246,0.2));
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .report-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--accent2);
  }

  .report-content {
    font-size: 14px;
    line-height: 1.8;
    color: var(--text);
    white-space: pre-wrap;
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent2);
    animation: dot-pulse 1.2s infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes dot-pulse {
    0%, 100% { opacity: 0.3; transform: scale(0.8); }
    50% { opacity: 1; transform: scale(1); }
  }

  /* 하단 컨트롤 */
  .controls {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 16px 20px 28px;
    background: linear-gradient(to top, var(--bg) 60%, transparent);
    display: flex;
    justify-content: center;
    gap: 16px;
    z-index: 100;
  }

  .mic-btn {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    transition: all 0.2s;
    position: relative;
  }

  .mic-btn.start {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    box-shadow: 0 4px 20px rgba(59,130,246,0.4);
  }

  .mic-btn.stop {
    background: linear-gradient(135deg, var(--danger), #f97316);
    box-shadow: 0 4px 20px rgba(239,68,68,0.4);
    animation: pulse-mic 2s infinite;
  }

  @keyframes pulse-mic {
    0%, 100% { box-shadow: 0 4px 20px rgba(239,68,68,0.4), 0 0 0 0 rgba(239,68,68,0.3); }
    50% { box-shadow: 0 4px 20px rgba(239,68,68,0.4), 0 0 0 12px rgba(239,68,68,0); }
  }

  .mic-btn:active { transform: scale(0.93); }

  .mic-label {
    font-size: 12px;
    color: var(--text2);
    text-align: center;
    margin-top: 6px;
  }

  .mic-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* 경고 메시지 */
  .warning {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 12px;
    padding: 14px 18px;
    font-size: 13px;
    color: #fca5a5;
    margin-bottom: 16px;
    display: none;
  }

  .warning.show { display: block; }

  /* 스크롤바 */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<div class="container">

  <!-- 헤더 -->
  <div class="header">
    <div class="logo">🎙️</div>
    <div class="header-text">
      <h1>AI 회의 중재자</h1>
      <p>실시간 음성 인식 · Gemini 분석</p>
    </div>
    <div class="status-badge idle" id="statusBadge">● 대기중</div>
  </div>

  <!-- API 키 입력 -->
  <div class="api-section">
    <div class="api-label">🔑 GEMINI API KEY</div>
    <div class="api-input-row">
      <input
        type="password"
        class="api-input"
        id="apiKeyInput"
        placeholder="Gemini API 키를 입력하세요"
      />
      <button class="btn-save" onclick="saveApiKey()">저장</button>
    </div>
    <div class="api-saved" id="apiSaved">✓ API 키가 저장되었습니다</div>
  </div>

  <!-- 경고 -->
  <div class="warning" id="warning"></div>

  <!-- 개입 알림 -->
  <div class="intervention" id="intervention">
    <div class="intervention-icon">🤖</div>
    <div class="intervention-text" id="interventionText"></div>
  </div>

  <!-- 실시간 음성 인식 -->
  <div class="speech-panel" id="speechPanel">
    <div class="panel-label">
      <div class="rec-dot" id="recDot"></div>
      실시간 음성 인식
    </div>
    <div class="speech-text placeholder" id="speechText">
      아래 마이크 버튼을 누르고 말씀해 주세요.
    </div>
    <div class="waveform" id="waveform">
      <div class="wave-bar" style="height:8px"></div>
      <div class="wave-bar" style="height:14px"></div>
      <div class="wave-bar" style="height:20px"></div>
      <div class="wave-bar" style="height:26px"></div>
      <div class="wave-bar" style="height:18px"></div>
      <div class="wave-bar" style="height:24px"></div>
      <div class="wave-bar" style="height:16px"></div>
      <div class="wave-bar" style="height:12px"></div>
      <div class="wave-bar" style="height:8px"></div>
    </div>
    <div class="timer" id="timer">⏱ 00:00</div>
  </div>

  <!-- AI 리포트 -->
  <div class="report-panel" id="reportPanel">
    <div class="report-header">
      <div class="report-icon">✨</div>
      <div class="report-title">AI 회의 분석 리포트</div>
    </div>
    <div class="report-content" id="reportContent"></div>
  </div>

</div>

<!-- 하단 마이크 버튼 -->
<div class="controls">
  <div class="mic-wrapper">
    <button class="mic-btn start" id="micBtn" onclick="toggleListening()">🎙️</button>
    <div class="mic-label" id="micLabel">녹음 시작</div>
  </div>
</div>

<script>
  // ── 상태 변수 ──
  let apiKey = '';
  let recognition = null;
  let isListening = false;
  let fullTranscript = '';
  let sessionTranscript = '';
  let interventionTimer = null;
  let timerInterval = null;
  let seconds = 0;
  let lastCheckedLength = 0;

  // ── API 키 저장 ──
  function saveApiKey() {
    const input = document.getElementById('apiKeyInput').value.trim();
    if (!input) {
      showWarning('API 키를 입력해주세요.');
      return;
    }
    apiKey = input;
    document.getElementById('apiSaved').style.display = 'block';
    hideWarning();
    setTimeout(() => {
      document.getElementById('apiSaved').style.display = 'none';
    }, 3000);
  }

  // ── 경고 표시 ──
  function showWarning(msg) {
    const el = document.getElementById('warning');
    el.textContent = msg;
    el.classList.add('show');
  }

  function hideWarning() {
    document.getElementById('warning').classList.remove('show');
  }

  // ── 타이머 ──
  function startTimer() {
    seconds = 0;
    timerInterval = setInterval(() => {
      seconds++;
      const m = String(Math.floor(seconds / 60)).padStart(2, '0');
      const s = String(seconds % 60).padStart(2, '0');
      document.getElementById('timer').textContent = `⏱ ${m}:${s}`;
    }, 1000);
    document.getElementById('timer').classList.add('show');
  }

  function stopTimer() {
    clearInterval(timerInterval);
    document.getElementById('timer').classList.remove('show');
  }

  // ── 음성 인식 시작/종료 ──
  function toggleListening() {
    if (!isListening) {
      startListening();
    } else {
      stopListening();
    }
  }

  function startListening() {
    if (!apiKey) {
      showWarning('먼저 Gemini API 키를 입력하고 저장해주세요.');
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      showWarning('이 브라우저는 음성 인식을 지원하지 않습니다. Chrome을 사용해주세요.');
      return;
    }

    hideWarning();
    recognition = new SpeechRecognition();
    recognition.lang = 'ko-KR';
    recognition.continuous = true;
    recognition.interimResults = true;

    sessionTranscript = '';
    lastCheckedLength = 0;

    recognition.onstart = () => {
      isListening = true;
      updateUI(true);
      startTimer();

      // 15초마다 AI 개입 체크
      interventionTimer = setInterval(() => {
        checkIntervention();
      }, 15000);
    };

    recognition.onresult = (event) => {
      let interim = '';
      let final = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          final += transcript;
        } else {
          interim += transcript;
        }
      }

      if (final) {
        sessionTranscript += final + ' ';
        fullTranscript += final + ' ';
      }

      const display = sessionTranscript + interim;
      const textEl = document.getElementById('speechText');
      textEl.classList.remove('placeholder');
      textEl.textContent = display || '말씀해 주세요...';
    };

    recognition.onerror = (event) => {
      if (event.error === 'not-allowed') {
        showWarning('마이크 권한이 거부되었습니다. 브라우저 설정에서 마이크를 허용해주세요.');
        stopListening();
      } else if (event.error !== 'no-speech') {
        console.error('음성 인식 오류:', event.error);
      }
    };

    recognition.onend = () => {
      // 자동 재시작 (continuous 모드 유지)
      if (isListening) {
        recognition.start();
      }
    };

    recognition.start();
  }

  function stopListening() {
    isListening = false;
    if (recognition) {
      recognition.onend = null;
      recognition.stop();
    }
    clearInterval(interventionTimer);
    stopTimer();
    updateUI(false);
    hideIntervention();

    // 최종 리포트 생성
    if (sessionTranscript.trim().length > 10) {
      generateReport(sessionTranscript.trim());
    }
  }

  // ── UI 상태 업데이트 ──
  function updateUI(listening) {
    const btn = document.getElementById('micBtn');
    const badge = document.getElementById('statusBadge');
    const panel = document.getElementById('speechPanel');
    const recDot = document.getElementById('recDot');
    const waveform = document.getElementById('waveform');
    const label = document.getElementById('micLabel');

    if (listening) {
      btn.className = 'mic-btn stop';
      btn.textContent = '⏹';
      badge.className = 'status-badge listening';
      badge.textContent = '● 녹음중';
      panel.classList.add('active');
      recDot.classList.add('show');
      waveform.classList.add('show');
      label.textContent = '녹음 중지';
    } else {
      btn.className = 'mic-btn start';
      btn.textContent = '🎙️';
      badge.className = 'status-badge idle';
      badge.textContent = '● 대기중';
      panel.classList.remove('active');
      recDot.classList.remove('show');
      waveform.classList.remove('show');
      label.textContent = '녹음 시작';

      const textEl = document.getElementById('speechText');
      if (!sessionTranscript.trim()) {
        textEl.classList.add('placeholder');
        textEl.textContent = '아래 마이크 버튼을 누르고 말씀해 주세요.';
      }
    }
  }

  // ── AI 개입 체크 ──
  function checkIntervention() {
    const current = sessionTranscript;
    if (current.length - lastCheckedLength < 10) return;
    lastCheckedLength = current.length;

    const triggerWords = ['근데', '그건', '현실적으로', '아니', '틀렸', '말이 안'];
    const triggered = triggerWords.find(w => current.slice(-50).includes(w));

    if (triggered) {
      showIntervention(`"${triggered}" 표현이 감지되었습니다. 상대방의 의견을 먼저 경청한 후 부드럽게 의견을 제시해보는 건 어떨까요?`);
    }

    // 긴 독점 발언 감지 (현재 세션이 200자 이상인데 최근에 계속 늘어남)
    if (current.length > 200 && current.length - lastCheckedLength > 80) {
      showIntervention('한 분이 오랫동안 발언하고 계십니다. 다른 분들의 의견도 들어보는 건 어떨까요?');
    }
  }

  function showIntervention(msg) {
    const el = document.getElementById('intervention');
    document.getElementById('interventionText').textContent = msg;
    el.classList.add('show');
    setTimeout(() => {
      el.classList.remove('show');
    }, 7000);
  }

  function hideIntervention() {
    document.getElementById('intervention').classList.remove('show');
  }

  // ── Gemini API 최종 리포트 ──
  async function generateReport(text) {
    const panel = document.getElementById('reportPanel');
    const content = document.getElementById('reportContent');

    panel.classList.add('show');
    content.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div> AI가 회의 내용을 분석하고 있습니다...';

    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

    const prompt = `너는 전문적인 AI 회의 분석가야. 다음 회의 내용을 분석해서 한국어로 아래 형식에 맞게 리포트를 작성해줘:

[📋 회의 요약]
- 핵심 논의 내용을 3줄 이내로 요약

[💡 주요 키워드]
- 자주 언급된 주제나 키워드 나열

[⚠️ 주의사항]
- 갈등 요소나 해결이 필요한 부분

[✅ 다음 액션 아이템]
- 회의에서 도출된 실행 항목

회의 내용:
"${text}"`;

    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      });

      if (!response.ok) {
        throw new Error(`API 오류: ${response.status}`);
      }

      const data = await response.json();
      const result = data?.candidates?.[0]?.content?.parts?.[0]?.text;

      if (result) {
        content.textContent = result;
      } else {
        content.textContent = 'AI 응답을 처리할 수 없습니다.';
      }
    } catch (e) {
      content.textContent = `오류가 발생했습니다: ${e.message}\n\nAPI 키를 확인해주세요.`;
    }
  }
</script>
</body>
</html>
